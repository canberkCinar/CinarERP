<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5e3a1b">
<title>Çınar ERP — Kantar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f4f1ee; color:#1a1a1a; padding-bottom:78px; }
  header { background:#5e3a1b; color:#fff; padding:14px 16px; position:sticky; top:0; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,.15); display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:16px; font-weight:600; }
  .sync-dot { width:9px; height:9px; border-radius:50%; background:#ffb300; flex-shrink:0; }
  .sync-dot.ok { background:#76ff03; } .sync-dot.err { background:#ff5252; }
  .container { padding:16px; max-width:680px; margin:0 auto; }
  .card { background:#fff; border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px; margin-top:12px; }
  label:first-child { margin-top:0; }
  input, select { width:100%; padding:13px; border:1.5px solid #ddd; border-radius:10px; font-size:16px; background:#fafafa; }
  input:focus, select:focus { outline:none; border-color:#5e3a1b; background:#fff; }
  .btn { width:100%; padding:15px; background:#5e3a1b; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; margin-top:16px; cursor:pointer; }
  .btn:active { background:#432a13; }
  .yon-sec { display:flex; gap:8px; margin-bottom:4px; }
  .yon-btn { flex:1; padding:14px; border-radius:10px; border:1.5px solid #ddd; background:#fafafa; font-size:15px; font-weight:600; color:#666; cursor:pointer; text-align:center; }
  .yon-btn.active-giris { background:#1b5e20; color:#fff; border-color:#1b5e20; }
  .yon-btn.active-cikis { background:#b35900; color:#fff; border-color:#b35900; }
  .ikili { display:flex; gap:10px; }
  .ikili > div { flex:1; }
  .net-kutu { background:#5e3a1b; color:#fff; border-radius:12px; padding:16px; text-align:center; margin-top:16px; }
  .net-kutu .lbl { font-size:13px; opacity:.85; }
  .net-kutu .val { font-size:32px; font-weight:700; margin-top:4px; }
  .net-kutu .alt { font-size:12px; opacity:.75; margin-top:4px; }
  .entry { display:flex; justify-content:space-between; align-items:center; padding:13px 14px; background:#fff; border-radius:12px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .entry-info { flex:1; min-width:0; }
  .entry-info .top { font-weight:600; font-size:15px; }
  .entry-info .sub { font-size:13px; color:#666; margin-top:3px; }
  .entry-info .meta { font-size:12px; color:#999; margin-top:2px; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; display:inline-block; margin-left:6px; }
  .badge-g { background:#c8e6c9; color:#1b5e20; }
  .badge-c { background:#ffe0b2; color:#b35900; }
  .del { background:#fde8e8; border:none; color:#d32f2f; font-size:16px; padding:8px 11px; border-radius:9px; cursor:pointer; flex-shrink:0; }
  .section-title { font-size:14px; font-weight:700; color:#444; margin:18px 0 10px 2px; }
  .tabs { display:flex; background:#fff; border-top:1px solid #e5e5e5; position:fixed; bottom:0; left:0; right:0; z-index:10; }
  .tab { flex:1; padding:10px; text-align:center; font-size:11px; color:#999; cursor:pointer; }
  .tab.active { color:#5e3a1b; font-weight:600; }
  .tab .ico { font-size:20px; display:block; margin-bottom:1px; }
  .empty { text-align:center; color:#999; padding:30px 20px; font-size:14px; }
  .hidden { display:none; }
  .hint { font-size:12px; color:#888; margin-top:8px; line-height:1.4; }
  .stat-bar { display:flex; gap:10px; margin-bottom:14px; }
  .stat { flex:1; background:#fff; border-radius:12px; padding:13px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .stat .num { font-size:20px; font-weight:700; color:#5e3a1b; }
  .stat .lbl { font-size:11px; color:#888; margin-top:2px; }
</style>
</head>
<body>

<header>
  <h1>⚖️ Çınar ERP — Kantar</h1>
  <div class="sync-dot" id="syncDot"></div>
</header>

<div class="container">

  <!-- TARTIM -->
  <div id="view-tartim">
    <div class="card">
      <div class="yon-sec">
        <div class="yon-btn active-giris" id="yonGiris" data-yon="giris">⬇️ GİRİŞ (Alım)</div>
        <div class="yon-btn" id="yonCikis" data-yon="cikis">⬆️ ÇIKIŞ (Satış)</div>
      </div>

      <label id="tarafLbl">Müstahsil</label>
      <select id="f-taraf"></select>

      <label>Ürün</label>
      <select id="f-urun"></select>

      <div class="ikili">
        <div>
          <label>Çavuş</label>
          <select id="f-cavus"></select>
        </div>
        <div>
          <label>Kamyoncu</label>
          <select id="f-kamyoncu"></select>
        </div>
      </div>

      <div class="ikili">
        <div>
          <label>Plaka</label>
          <input type="text" id="f-plaka" placeholder="Kamyoncu seçilince gelir" readonly style="background:#eee">
        </div>
        <div>
          <label>Bölge</label>
          <select id="f-bolge"></select>
        </div>
      </div>

      <label>Tartım (kg)</label>
      <div class="ikili">
        <div>
          <input type="number" id="f-bos" inputmode="decimal" placeholder="Boş (dara)">
        </div>
        <div>
          <input type="number" id="f-dolu" inputmode="decimal" placeholder="Dolu">
        </div>
      </div>

      <label>Kasa Tipi & Adet</label>
      <div class="ikili">
        <div><select id="f-kasatip"></select></div>
        <div><input type="number" id="f-kasa" inputmode="numeric" placeholder="Kasa adedi"></div>
      </div>

      <label>Palet Tipi & Adet</label>
      <div class="ikili">
        <div><select id="f-palettip"></select></div>
        <div><input type="number" id="f-palet" inputmode="numeric" placeholder="Palet adedi"></div>
      </div>

      <div class="net-kutu">
        <div class="lbl">NET MEYVE</div>
        <div class="val" id="netVal">0 kg</div>
        <div class="alt" id="netAlt">Dolu − Boş − kasa/palet darası</div>
      </div>

      <button class="btn" id="btnKaydet">Tartımı Kaydet</button>
    </div>
  </div>

  <!-- KAYITLAR -->
  <div id="view-kayit" class="hidden">
    <div class="stat-bar">
      <div class="stat"><div class="num" id="stat-giris">0</div><div class="lbl">Giriş kg (bugün)</div></div>
      <div class="stat"><div class="num" id="stat-cikis">0</div><div class="lbl">Çıkış kg (bugün)</div></div>
    </div>
    <div class="section-title">Bugünün Tartımları</div>
    <div id="liste"></div>
  </div>

</div>

<div class="tabs">
  <div class="tab active" data-tab="tartim"><span class="ico">⚖️</span>Tartım</div>
  <div class="tab" data-tab="kayit"><span class="ico">📋</span>Kayıtlar</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://lpzasmhpwbnvrugajqcl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_N_UdhK5n-otBQzqCYczASw_49Z0Uut9';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let cache = { kunye:[], bolge:[], param:{cavus_yevmiye:0}, kantar:[], daraTip:[] };
let yon = 'giris';

const dot = document.getElementById('syncDot');
function durum(s){ dot.className='sync-dot'+(s==='ok'?' ok':s==='err'?' err':''); }
function bugun(){ return new Date().toISOString().split('T')[0]; }

// ---------- Veri çek ----------
async function cek(){
  try{
    const [ku, bo, pg, ka, dt] = await Promise.all([
      sb.from('kunye').select('*').eq('aktif',true),
      sb.from('param_kamyon_servis').select('*'),
      sb.from('param_genel').select('*').eq('id',1).single(),
      sb.from('kantar').select('*'),
      sb.from('param_dara_tip').select('*')
    ]);
    if(ku.error||bo.error){ console.error(ku.error||bo.error); durum('err'); return; }
    cache.kunye = ku.data||[];
    cache.bolge = bo.data||[];
    cache.param = pg.data||cache.param;
    cache.kantar = ka.data||[];
    cache.daraTip = dt.data||[];
    durum('ok');
    dropdownlar(); netHesapla(); listele();
  }catch(e){ console.error(e); durum('err'); }
}

function kunyeArr(tip){ return cache.kunye.filter(function(x){return x.tip===tip;}).sort(function(a,b){return a.ad.localeCompare(b.ad,'tr');}); }
function opt(arr){ return '<option value="">Seçiniz...</option>'+arr.map(function(x){return '<option value="'+x.id+'">'+x.ad+'</option>';}).join(''); }

function dropdownlar(){
  document.getElementById('f-taraf').innerHTML = opt(kunyeArr(yon==='giris'?'mustahsil':'musteri'));
  document.getElementById('f-urun').innerHTML = opt(kunyeArr('urun'));
  document.getElementById('f-cavus').innerHTML = opt(kunyeArr('cavus'));
  document.getElementById('f-kamyoncu').innerHTML = opt(kunyeArr('kamyoncu'));
  document.getElementById('f-bolge').innerHTML = '<option value="">Seçiniz...</option>'+
    cache.bolge.sort(function(a,b){return a.bolge.localeCompare(b.bolge,'tr');}).map(function(b){return '<option value="'+b.id+'">'+b.bolge+'</option>';}).join('');
  // kasa/palet tipleri
  const kasalar = cache.daraTip.filter(function(d){return d.kategori==='kasa';}).sort(function(a,b){return a.ad.localeCompare(b.ad,'tr');});
  const paletler = cache.daraTip.filter(function(d){return d.kategori==='palet';}).sort(function(a,b){return a.ad.localeCompare(b.ad,'tr');});
  document.getElementById('f-kasatip').innerHTML = '<option value="">Yok</option>'+kasalar.map(function(d){return '<option value="'+d.id+'">'+d.ad+' ('+d.birim_kg+'kg)</option>';}).join('');
  document.getElementById('f-palettip').innerHTML = '<option value="">Yok</option>'+paletler.map(function(d){return '<option value="'+d.id+'">'+d.ad+' ('+d.birim_kg+'kg)</option>';}).join('');
}

// kamyoncu seçilince plaka otomatik gelsin
document.getElementById('f-kamyoncu').addEventListener('change', function(){
  const k = cache.kunye.find(function(x){return x.id==this.value;}.bind(this));
  document.getElementById('f-plaka').value = (k && k.plaka) ? k.plaka : '';
});

// ---------- Net meyve hesabı ----------
function kasaBirimKg(){ const d=cache.daraTip.find(function(x){return x.id==document.getElementById('f-kasatip').value;}); return d?d.birim_kg:0; }
function paletBirimKg(){ const d=cache.daraTip.find(function(x){return x.id==document.getElementById('f-palettip').value;}); return d?d.birim_kg:0; }

function netHesapla(){
  const bos = parseFloat(document.getElementById('f-bos').value)||0;
  const dolu = parseFloat(document.getElementById('f-dolu').value)||0;
  const kasaAd = parseInt(document.getElementById('f-kasa').value)||0;
  const paletAd = parseInt(document.getElementById('f-palet').value)||0;
  const kasaDara = kasaBirimKg();
  const paletDara = paletBirimKg();
  const net = dolu - bos - (kasaAd*kasaDara) - (paletAd*paletDara);
  document.getElementById('netVal').textContent = (net>0?net.toFixed(1):'0') + ' kg';
  document.getElementById('netAlt').textContent =
    dolu+' − '+bos+' − ('+kasaAd+'×'+kasaDara+') − ('+paletAd+'×'+paletDara+')';
  return net;
}

['f-bos','f-dolu','f-kasa','f-palet'].forEach(function(id){
  document.getElementById(id).addEventListener('input', netHesapla);
});
['f-kasatip','f-palettip'].forEach(function(id){
  document.getElementById(id).addEventListener('change', netHesapla);
});

// ---------- Yön değiştir ----------
function yonSet(y){
  yon = y;
  document.getElementById('yonGiris').className = 'yon-btn'+(y==='giris'?' active-giris':'');
  document.getElementById('yonCikis').className = 'yon-btn'+(y==='cikis'?' active-cikis':'');
  document.getElementById('tarafLbl').textContent = y==='giris'?'Müstahsil':'Müşteri';
  dropdownlar();
}

// ---------- Kaydet ----------
async function kaydet(){
  const tarafId = document.getElementById('f-taraf').value;
  const urunId = document.getElementById('f-urun').value;
  const cavusId = document.getElementById('f-cavus').value;
  const kamyoncuId = document.getElementById('f-kamyoncu').value;
  const bolgeId = document.getElementById('f-bolge').value;
  const plaka = document.getElementById('f-plaka').value.trim();
  const bos = parseFloat(document.getElementById('f-bos').value)||0;
  const dolu = parseFloat(document.getElementById('f-dolu').value)||0;
  const kasaAd = parseInt(document.getElementById('f-kasa').value)||0;
  const paletAd = parseInt(document.getElementById('f-palet').value)||0;
  const net = netHesapla();

  if(!tarafId){ alert((yon==='giris'?'Müstahsil':'Müşteri')+' seçiniz.'); return; }
  if(!urunId){ alert('Ürün seçiniz.'); return; }
  if(dolu<=0){ alert('Dolu tartım giriniz.'); return; }
  if(net<=0){ if(!confirm('Net meyve 0 veya eksi çıktı. Yine de kaydedilsin mi?')) return; }

  // bölge fiyatları (gizli - kayda yazılır)
  const bolge = cache.bolge.find(function(b){return b.id==bolgeId;});

  const kayit = {
    id: Date.now(),
    tarih: new Date().toISOString(),
    yon: yon,
    taraf_id: parseInt(tarafId),
    urun_id: parseInt(urunId),
    cavus_id: cavusId?parseInt(cavusId):null,
    kamyoncu_id: kamyoncuId?parseInt(kamyoncuId):null,
    plaka: plaka||null,
    dolu_kg: dolu,
    bos_kg: bos,
    net_kg: net,
    kasa_adet: kasaAd,
    palet_adet: paletAd,
    kasa_tip_id: document.getElementById('f-kasatip').value?parseInt(document.getElementById('f-kasatip').value):null,
    palet_tip_id: document.getElementById('f-palettip').value?parseInt(document.getElementById('f-palettip').value):null,
    kamyon_bolge: bolge?bolge.bolge:null,
    servis_ucret: bolge?bolge.servis_fiyat:null,
    kamyon_ucret: bolge?bolge.kamyon_fiyat:null,
    cavus_yevmiye: cache.param.cavus_yevmiye||null
  };

  durum('wait');
  const { error } = await sb.from('kantar').insert(kayit);
  if(error){ alert('HATA: '+error.message+'\n\nDetay: '+(error.details||'-')+'\nHint: '+(error.hint||'-')); durum('err'); console.error(error); return; }
  cache.kantar.unshift(kayit);
  durum('ok');
  alert('Tartım kaydedildi ✓\nNet meyve: '+net.toFixed(1)+' kg');

  // temizle
  ['f-plaka','f-bos','f-dolu','f-kasa','f-palet'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-kamyoncu').value='';
  netHesapla(); listele();
}

// ---------- Listele ----------
function ad(id){ const x=cache.kunye.find(function(y){return y.id==id;}); return x?x.ad:'—'; }

function listele(){
  const today = bugun();
  const bugunku = cache.kantar.filter(function(k){ return (k.tarih||'').split('T')[0]===today; });
  document.getElementById('stat-giris').textContent =
    bugunku.filter(function(k){return k.yon==='giris';}).reduce(function(t,k){return t+(k.net_kg||0);},0).toFixed(0);
  document.getElementById('stat-cikis').textContent =
    bugunku.filter(function(k){return k.yon==='cikis';}).reduce(function(t,k){return t+(k.net_kg||0);},0).toFixed(0);

  const el = document.getElementById('liste');
  if(bugunku.length===0){ el.innerHTML='<div class="empty">Bugün henüz tartım yok.</div>'; return; }
  bugunku.sort(function(a,b){return b.id-a.id;});
  el.innerHTML = bugunku.map(function(k){
    const saat = new Date(k.tarih).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    return '<div class="entry"><div class="entry-info">'
      +'<div class="top">'+ad(k.taraf_id)+' · '+ad(k.urun_id)
      +' <span class="badge '+(k.yon==='giris'?'badge-g':'badge-c')+'">'+(k.yon==='giris'?'GİRİŞ':'ÇIKIŞ')+'</span></div>'
      +'<div class="sub">Net: <b>'+(k.net_kg||0).toFixed(1)+' kg</b> · Dolu '+(k.dolu_kg||0)+' / Boş '+(k.bos_kg||0)+'</div>'
      +'<div class="meta">'+saat+(k.plaka?' · '+k.plaka:'')+(k.kasa_adet?' · '+k.kasa_adet+' kasa':'')+'</div>'
      +'</div><button class="del" data-sil="'+k.id+'">🗑</button></div>';
  }).join('');
}

async function sil(id){
  if(!confirm('Bu tartım silinsin mi?')) return;
  durum('wait');
  const { error } = await sb.from('kantar').delete().eq('id', id);
  if(error){ alert('Silinemedi.'); durum('err'); return; }
  cache.kantar = cache.kantar.filter(function(k){return k.id!==id;});
  durum('ok'); listele();
}

// ---------- Olaylar ----------
document.addEventListener('click', function(e){
  const y = e.target.closest('[data-yon]'); if(y){ yonSet(y.getAttribute('data-yon')); return; }
  const s = e.target.closest('[data-sil]'); if(s){ sil(parseInt(s.getAttribute('data-sil'))); return; }
  if(e.target.closest('#btnKaydet')){ kaydet(); return; }
  const t = e.target.closest('[data-tab]');
  if(t){ const v=t.getAttribute('data-tab');
    document.getElementById('view-tartim').classList.toggle('hidden', v!=='tartim');
    document.getElementById('view-kayit').classList.toggle('hidden', v!=='kayit');
    document.querySelectorAll('.tab').forEach(function(tb){ tb.classList.toggle('active', tb.getAttribute('data-tab')===v); });
    if(v==='kayit') listele();
    return;
  }
});

durum('wait'); cek();
</script>
</body>
</html>
